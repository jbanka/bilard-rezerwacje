spring:
  application:
    name: rezerwacje
  datasource:
    url: jdbc:h2:mem:rezerwacje;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
  h2:
    console:
      enabled: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: my-super-secret-key-for-poc-only-32chars!!
    expiration-minutes: 60
  availability:
    day-start: "08:00"
    day-end: "22:00"
    slot-minutes: 30

---
spring:
  config:
    activate:
      on-profile: dev
  h2:
    console:
      enabled: true
  jpa:
    show-sql: true

logging:
  level:
    org.example.rezerwacje: DEBUG
